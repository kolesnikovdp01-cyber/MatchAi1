kind = "web"
previewPath = "/"
title = "Football Analytics"
version = "1.0.0"
id = "artifacts/football-analytics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20711

[services.development]
run = "pnpm --filter @workspace/football-analytics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/football-analytics", "run", "build" ]
publicDir = "artifacts/football-analytics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20711"
BASE_PATH = "/"
